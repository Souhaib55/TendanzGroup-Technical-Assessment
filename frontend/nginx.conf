server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route all requests to index.html so Angular's client-side router handles them.
    # Without this, refreshing /quotes/5 would return a 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api calls to the backend container.
    # The hostname 'backend' resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional: improve caching for static assets
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
