name: CI — Pricing Engine

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — Backend: build + unit tests
  # ─────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run unit tests
        working-directory: backend
        run: mvn verify --batch-mode

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Frontend: install + production build
  # ─────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration production

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 — Docker: build images (only on main, after both CI jobs pass)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pricing-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t pricing-frontend:${{ github.sha }} ./frontend
