services:
  # ─── Backend: Spring Boot ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricing-backend
    ports:
      - "8080:8080"
    networks:
      - pricing-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/products"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Frontend: Angular + Nginx ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pricing-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pricing-net

networks:
  pricing-net:
    driver: bridge
